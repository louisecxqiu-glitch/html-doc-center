name: Release HTML Studio

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Signed and notarized macOS arm64 DMG
    runs-on: macos-15
    environment: desktop-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate release metadata and tag
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"
          python3 scripts/verify_release.py --check --expected-tag "${GITHUB_REF_NAME}"

      - name: Install build dependencies
        run: python3 -m pip install -r requirements-build.txt

      - name: Import Developer ID certificate
        shell: bash
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          test -n "${CERTIFICATE_P12_BASE64}"
          test -n "${CERTIFICATE_PASSWORD}"
          CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/htmlstudio-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          printf '%s' "${CERTIFICATE_P12_BASE64}" | base64 -D > "${CERTIFICATE_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -k "${KEYCHAIN_PATH}" -P "${CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

      - name: Prepare App Store Connect team API key
        shell: bash
        env:
          API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          test -n "${API_KEY_P8_BASE64}"
          API_KEY_PATH="${RUNNER_TEMP}/AuthKey.p8"
          printf '%s' "${API_KEY_P8_BASE64}" | base64 -D > "${API_KEY_PATH}"
          chmod 600 "${API_KEY_PATH}"
          echo "APPLE_API_KEY=${API_KEY_PATH}" >> "${GITHUB_ENV}"

      - name: Build, sign, notarize, staple, and verify DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          test -n "${APPLE_API_KEY_ID}"
          test -n "${APPLE_API_ISSUER_ID}"
          python3 scripts/release_macos.py --version "$(tr -d '[:space:]' < VERSION)"

      - uses: actions/upload-artifact@v4
        with:
          name: HTMLStudio-macOS-arm64
          path: dist/HTMLStudio-*-macos-arm64.dmg
          if-no-files-found: error

  build-windows:
    name: Windows executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate release metadata and tag
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ("v$version" -ne "$env:GITHUB_REF_NAME") { throw "Tag/version mismatch" }
          python scripts/verify_release.py --check --expected-tag "$env:GITHUB_REF_NAME"

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build executable
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          python build.py --version $version

      - uses: actions/upload-artifact@v4
        with:
          name: HTMLStudio-Windows
          path: dist/HTMLStudio.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate release checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum HTMLStudio-*-macos-arm64.dmg HTMLStudio.exe > SHA256SUMS.txt

      - name: Publish immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release-assets/HTMLStudio-*-macos-arm64.dmg \
            release-assets/HTMLStudio.exe \
            release-assets/SHA256SUMS.txt \
            --generate-notes
