<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">macOS DMG 分发流程</title>
  <desc id="desc">从构建 App 到签名、公证、钉入票据和分发的流程</desc>
  <rect width="1200" height="520" rx="32" fill="#f5f5f7"/>
  <text x="72" y="78" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Helvetica Neue,Arial,sans-serif" font-size="30" font-weight="700">一条可复用的发布链路</text>
  <text x="72" y="116" fill="#6e6e73" font-family="-apple-system,BlinkMacSystemFont,Helvetica Neue,Arial,sans-serif" font-size="18">签名后的 App 不再改写，再提交 Apple 公证</text>
  <g font-family="-apple-system,BlinkMacSystemFont,Helvetica Neue,Arial,sans-serif">
    <g transform="translate(72 182)">
      <rect width="190" height="190" rx="22" fill="#fff"/>
      <circle cx="38" cy="40" r="20" fill="#06c"/><text x="32" y="47" fill="#fff" font-size="18" font-weight="700">1</text>
      <text x="24" y="94" fill="#1d1d1f" font-size="21" font-weight="700">Build</text>
      <text x="24" y="130" fill="#6e6e73" font-size="16">构建 App</text>
      <text x="24" y="156" fill="#6e6e73" font-size="16">准备资源</text>
    </g>
    <g transform="translate(290 182)">
      <rect width="190" height="190" rx="22" fill="#fff"/>
      <circle cx="38" cy="40" r="20" fill="#06c"/><text x="32" y="47" fill="#fff" font-size="18" font-weight="700">2</text>
      <text x="24" y="94" fill="#1d1d1f" font-size="21" font-weight="700">Sign</text>
      <text x="24" y="130" fill="#6e6e73" font-size="16">签名 App</text>
      <text x="24" y="156" fill="#6e6e73" font-size="16">开启硬化运行时</text>
    </g>
    <g transform="translate(508 182)">
      <rect width="190" height="190" rx="22" fill="#fff"/>
      <circle cx="38" cy="40" r="20" fill="#06c"/><text x="32" y="47" fill="#fff" font-size="18" font-weight="700">3</text>
      <text x="24" y="94" fill="#1d1d1f" font-size="21" font-weight="700">Package</text>
      <text x="24" y="130" fill="#6e6e73" font-size="16">制作 DMG</text>
      <text x="24" y="156" fill="#6e6e73" font-size="16">再签名 DMG</text>
    </g>
    <g transform="translate(726 182)">
      <rect width="190" height="190" rx="22" fill="#fff"/>
      <circle cx="38" cy="40" r="20" fill="#06c"/><text x="32" y="47" fill="#fff" font-size="18" font-weight="700">4</text>
      <text x="24" y="94" fill="#1d1d1f" font-size="21" font-weight="700">Notarize</text>
      <text x="24" y="130" fill="#6e6e73" font-size="16">提交 Apple</text>
      <text x="24" y="156" fill="#6e6e73" font-size="16">等待 Accepted</text>
    </g>
    <g transform="translate(944 182)">
      <rect width="184" height="190" rx="22" fill="#fff"/>
      <circle cx="38" cy="40" r="20" fill="#06c"/><text x="32" y="47" fill="#fff" font-size="18" font-weight="700">5</text>
      <text x="24" y="94" fill="#1d1d1f" font-size="21" font-weight="700">Staple</text>
      <text x="24" y="130" fill="#6e6e73" font-size="16">钉入票据</text>
      <text x="24" y="156" fill="#6e6e73" font-size="16">自由分发</text>
    </g>
  </g>
  <g stroke="#06c" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M262 277h28"/><path d="M480 277h28"/><path d="M698 277h28"/><path d="M916 277h28"/>
  </g>
</svg>
