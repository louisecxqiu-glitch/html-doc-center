<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{FILE_NAME}} · Markdown</title>
  <style>
    :root {
      --ink: #1A1D23;
      --ink-2: #2D3139;
      --gold: #C9A961;
      --bg: #FAFAF7;
      --bg-muted: #F1F1ED;
      --text-1: #1A1D23;
      --text-2: #4B5563;
      --text-3: #6B7280;
      --border: #E5E7EB;
      --green: #10B981;
      --amber: #F59E0B;
      --accent: #C9A961;
      --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      --mono: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;

      /* v1.13: 分栏比例，可由 JS 写入 */
      --md-split-left: 50%;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: var(--font); color: var(--text-1); background: var(--bg); }

    /* 顶部条 */
    .md-header {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      background: linear-gradient(180deg, var(--ink) 0%, var(--ink-2) 100%);
      color: #E5E7EB;
      font-size: 13px;
      border-bottom: 1px solid rgba(201,169,97,0.25);
    }
    .md-header .md-title {
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.3px;
    }
    .md-header .md-sep {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.2);
    }
    .md-header .md-hint {
      color: #9CA3AF;
      font-size: 12px;
    }
    .md-header .md-status {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #9CA3AF;
    }
    .md-header .md-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      transition: background .2s;
    }
    .md-header .md-dot.dirty { background: var(--amber); animation: md-pulse 1.2s infinite; }
    @keyframes md-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* v1.13: 视图切换工具栏 */
    .md-view-toolbar {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      padding: 2px;
    }
    .md-view-btn {
      background: transparent;
      border: 0;
      color: #9CA3AF;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font);
      transition: background .15s, color .15s;
    }
    .md-view-btn:hover {
      background: rgba(255,255,255,0.08);
      color: #E5E7EB;
    }
    .md-view-btn.active {
      background: rgba(201,169,97,0.18);
      color: var(--gold);
      font-weight: 600;
    }

    /* 主体：左右分栏 */
    .md-container {
      display: flex;
      height: calc(100vh - 40px);
      background: #fff;
    }
    .md-pane {
      min-width: 0;
      overflow: auto;
    }
    .md-pane-source {
      flex: 0 0 var(--md-split-left);
    }
    .md-pane-preview {
      flex: 1 1 auto;
      border-left: 1px solid var(--border);
    }

    /* v1.13: 中间拖拽分栏条 */
    .md-splitter {
      flex: 0 0 6px;
      background: var(--border);
      cursor: col-resize;
      transition: background .15s;
      user-select: none;
      position: relative;
    }
    .md-splitter::before {
      content: '';
      position: absolute;
      left: -3px; right: -3px; top: 0; bottom: 0;
      /* 加宽点击/拖拽热区，但不影响视觉宽度 */
    }
    .md-splitter:hover,
    .md-splitter.dragging {
      background: var(--gold);
    }

    /* v1.13: 三视图模式 */
    [data-view-mode="source"] .md-pane-preview,
    [data-view-mode="source"] .md-splitter {
      display: none;
    }
    [data-view-mode="source"] .md-pane-source {
      flex: 1 1 100%;
    }
    [data-view-mode="preview"] .md-pane-source,
    [data-view-mode="preview"] .md-splitter {
      display: none;
    }
    [data-view-mode="preview"] .md-pane-preview {
      flex: 1 1 100%;
      border-left: 0;
    }

    /* 公众号排版模式：复用左侧 Markdown 编辑，右侧隔离渲染完整 HTML */
    [data-view-mode="wechat"] .md-pane-source {
      flex: 0 0 var(--md-split-left);
    }
    [data-view-mode="wechat"] .md-pane-preview {
      flex: 1 1 auto;
      border-left: 1px solid var(--border);
      padding: 0;
    }
    [data-view-mode="wechat"] .md-preview {
      display: none;
    }
    #wechat-preview-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #f5f5f7;
    }
    .md-wechat-actions {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-left: 4px;
    }
    .md-wechat-action {
      border: 1px solid rgba(201,169,97,.55);
      border-radius: 4px;
      padding: 4px 8px;
      color: var(--gold);
      background: rgba(201,169,97,.08);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .md-wechat-action:hover { background: rgba(201,169,97,.18); }
    .md-wechat-status { color: #9CA3AF; font-size: 11px; }

    /* 左：textarea */
    #md-input {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      outline: 0;
      resize: none;
      padding: 20px 24px;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-1);
      background: #FAFAF7;
      tab-size: 2;
    }

    /* 右：预览 */
    .md-preview {
      padding: 28px 36px 80px;
      line-height: 1.75;
      color: var(--text-1);
      font-size: 15px;
    }
    .md-preview h1, .md-preview h2, .md-preview h3, .md-preview h4 {
      margin: 1.4em 0 0.6em;
      line-height: 1.3;
      font-weight: 600;
      color: var(--ink);
    }
    .md-preview h1 { font-size: 1.9em; border-bottom: 2px solid var(--border); padding-bottom: 0.3em; }
    .md-preview h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
    .md-preview h3 { font-size: 1.25em; }
    .md-preview h4 { font-size: 1.05em; color: var(--text-2); }
    .md-preview p { margin: 0.8em 0; }
    .md-preview ul, .md-preview ol { padding-left: 1.6em; margin: 0.8em 0; }
    .md-preview li { margin: 0.3em 0; }
    .md-preview code {
      font-family: var(--mono);
      font-size: 0.88em;
      background: var(--bg-muted);
      padding: 1px 6px;
      border-radius: 4px;
      color: #BE185D;
    }
    .md-preview pre {
      background: var(--ink);
      color: #E5E7EB;
      padding: 14px 18px;
      border-radius: 6px;
      overflow: auto;
      font-size: 13px;
      line-height: 1.6;
      margin: 1em 0;
    }
    .md-preview pre code {
      background: transparent;
      color: inherit;
      padding: 0;
      font-size: inherit;
    }
    .md-preview blockquote {
      margin: 1em 0;
      padding: 0.5em 1.2em;
      border-left: 3px solid var(--gold);
      background: var(--bg-muted);
      color: var(--text-2);
    }
    .md-preview a { color: var(--gold); }
    .md-preview a:hover { text-decoration: underline; }
    .md-preview table {
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 14px;
    }
    .md-preview th, .md-preview td {
      border: 1px solid var(--border);
      padding: 6px 12px;
    }
    .md-preview th { background: var(--bg-muted); font-weight: 600; }
    .md-preview img { max-width: 100%; border-radius: 4px; }
    .md-preview hr { border: 0; border-top: 1px solid var(--border); margin: 1.5em 0; }
  </style>
</head>
<body>
  <div class="md-header">
    <span class="md-title">📝 {{FILE_NAME}}</span>
    <span class="md-sep"></span>
    <span class="md-hint" id="md-hint">左侧编辑 · 右侧实时预览 · 2 秒自动快照</span>
    <span class="md-sep"></span>
    <span class="md-view-toolbar" id="md-view-toolbar">
      <button class="md-view-btn" data-view="source" id="btn-source" title="">📝 原文</button>
      <button class="md-view-btn active" data-view="split" id="btn-split" title="">⇔ 分栏</button>
      <button class="md-view-btn" data-view="preview" id="btn-preview" title="">👁 预览</button>
      <button class="md-view-btn" data-view="wechat" id="btn-wechat" title="">📰 公众号排版</button>
    </span>
    <span class="md-wechat-actions" id="md-wechat-actions" hidden>
      <button class="md-wechat-action" id="btn-wechat-copy" type="button">复制 HTML</button>
      <button class="md-wechat-action" id="btn-wechat-export" type="button">导出 HTML</button>
      <span class="md-wechat-status" id="md-wechat-status"></span>
    </span>
    <span class="md-status">
      <span class="md-dot" id="md-dot"></span>
      <span id="md-status-text">已就绪</span>
    </span>
  </div>
  <div class="md-container" id="md-container" data-view-mode="split">
    <div class="md-pane md-pane-source"><textarea id="md-input" spellcheck="false">{{MD_CONTENT}}</textarea></div>
    <div class="md-splitter" id="md-splitter" role="separator" aria-label="Drag to resize panes" tabindex="0"></div>
    <div class="md-pane md-pane-preview">
      <div class="md-preview" id="md-preview"></div>
      <iframe id="wechat-preview-frame" title="公众号排版预览" sandbox="allow-same-origin"></iframe>
    </div>
  </div>

  <script>
    // DocCenter 上下文：saver-runtime.js 靠 mode="md" 走 md 分支
    window.__DOC_CENTER__ = {
      filePath: "{{FILE_PATH}}",
      serverOrigin: "{{SERVER_ORIGIN}}",
      inIframe: window.self !== window.top,
      mode: "md"
    };
  </script>
  <script src="/static/vendor/marked.min.js"></script>
  <script>
    // 实时预览（150ms debounce）
    (function () {
      var input = document.getElementById("md-input");
      var preview = document.getElementById("md-preview");
      var wechatFrame = document.getElementById("wechat-preview-frame");
      var wechatStatus = document.getElementById("md-wechat-status");
      var timer = null;
      var wechatTimer = null;
      var wechatAbort = null;
      var wechatState = { html: "", text: "", filename: "" };

      function setWechatStatus(text, isError) {
        if (!wechatStatus) return;
        wechatStatus.textContent = text || "";
        wechatStatus.style.color = isError ? "#FCA5A5" : "#9CA3AF";
      }

      function requestWechatPreview(immediate) {
        clearTimeout(wechatTimer);
        var run = async function () {
          if (wechatAbort) wechatAbort.abort();
          wechatAbort = new AbortController();
          setWechatStatus("排版中…", false);
          try {
            var response = await fetch("/api/wechat/format", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                path: window.__DOC_CENTER__.filePath,
                content: input.value
              }),
              signal: wechatAbort.signal
            });
            var data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || "公众号排版失败");
            wechatState = data;
            if (wechatFrame) wechatFrame.srcdoc = data.html;
            setWechatStatus("已更新", false);
          } catch (error) {
            if (error && error.name === "AbortError") return;
            setWechatStatus((error && error.message) || "公众号排版失败", true);
          }
        };
        if (immediate) run();
        else wechatTimer = setTimeout(run, 250);
      }

      function fallbackCopyText(text) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        var ok = false;
        try { ok = document.execCommand("copy"); } catch (e) { ok = false; }
        ta.remove();
        return ok;
      }

      async function copyWechatHtml() {
        if (!wechatState.html) {
          setWechatStatus("请先等待排版完成", true);
          return false;
        }
        try {
          if (navigator.clipboard && window.ClipboardItem) {
            var item = new ClipboardItem({
              "text/html": new Blob([wechatState.html], { type: "text/html" }),
              "text/plain": new Blob([wechatState.text], { type: "text/plain" })
            });
            await navigator.clipboard.write([item]);
          } else if (!fallbackCopyText(wechatState.text)) {
            throw new Error("当前浏览器不支持富文本复制");
          }
          setWechatStatus("已复制，可粘贴到公众号", false);
          return true;
        } catch (error) {
          setWechatStatus(error.message || "复制失败", true);
          return false;
        }
      }

      function exportWechatHtml() {
        if (!wechatState.html) {
          setWechatStatus("请先等待排版完成", true);
          return false;
        }
        var blob = new Blob([wechatState.html], { type: "text/html;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.href = url;
        link.download = wechatState.filename || "wechat-article.html";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setWechatStatus("已导出 HTML", false);
        return true;
      }

      function render() {
        try {
          preview.innerHTML = window.marked
            ? window.marked.parse(input.value || "")
            : "<pre>" + (input.value || "") + "</pre>";
        } catch (e) {
          preview.innerHTML = "<pre style='color:#DC2626'>预览渲染失败：" + (e.message || e) + "</pre>";
        }
      }

      render();
      input.addEventListener("input", function () {
        clearTimeout(timer);
        timer = setTimeout(render, 150);
        var container = document.getElementById("md-container");
        if (container && container.dataset.viewMode === "wechat") requestWechatPreview(false);
      });

      // 暴露给 saver-runtime.js：请求当前内容
      window.__MD_GET_CONTENT__ = function () { return input.value; };
      window.__MD_SET_CONTENT__ = function (v) {
        input.value = v;
        render();
        var container = document.getElementById("md-container");
        if (container && container.dataset.viewMode === "wechat") requestWechatPreview(true);
      };
      window.__MD_WECHAT_CTL__ = {
        enter: function () { requestWechatPreview(true); },
        exit: function () { setWechatStatus("", false); },
        refresh: function () { requestWechatPreview(true); },
        copyHtml: copyWechatHtml,
        exportHtml: exportWechatHtml
      };
    })();
  </script>

  <!-- v1.13: 三视图控制器（视图切换 + 拖拽分栏 + 双语 + localStorage 持久化） -->
  <script>
    (function () {
      var LS_VIEW = "doccenter.md.viewMode";       // 'source' | 'split' | 'preview'
      var LS_RATIO = "doccenter.md.splitRatio";    // 0.1 ~ 0.9, default 0.5
      var LS_LANG = "doccenter.lang";              // 'en' | 'zh'，与主 app 共享
      var MIN_RATIO = 0.1, MAX_RATIO = 0.9, DEFAULT_RATIO = 0.5;
      var ALLOWED_VIEWS = { source: 1, split: 1, preview: 1, wechat: 1 };

      // 微型双语字典（壳子页面独立，与主 app 的 i18n.js 不耦合）
      var I18N = {
        en: {
          'view.source': '📝 Source',
          'view.split': '⇔ Split',
          'view.preview': '👁 Preview',
          'view.wechat': '📰 WeChat',
          'view.source.tip': 'Show source only (hide preview)',
          'view.split.tip': 'Show source and preview side by side',
          'view.preview.tip': 'Show preview only (hide source)',
          'view.wechat.tip': 'Open Apple-style WeChat publishing mode',
          'hint': 'Edit on the left · Live preview on the right · Auto snapshot every 2s',
          'status.ready': 'Ready'
        },
        zh: {
          'view.source': '📝 原文',
          'view.split': '⇔ 分栏',
          'view.preview': '👁 预览',
          'view.wechat': '📰 公众号排版',
          'view.source.tip': '仅展示原文（隐藏预览）',
          'view.split.tip': '左侧编辑 · 右侧预览',
          'view.preview.tip': '仅展示预览（隐藏原文）',
          'view.wechat.tip': '打开苹果风格公众号排版模式',
          'hint': '左侧编辑 · 右侧实时预览 · 2 秒自动快照',
          'status.ready': '已就绪'
        }
      };

      function getLang() {
        var saved = localStorage.getItem(LS_LANG);
        return (saved === 'zh' || saved === 'en') ? saved : 'en';
      }

      function applyI18n() {
        var lang = getLang();
        var d = I18N[lang];
        document.getElementById('btn-source').textContent = d['view.source'];
        document.getElementById('btn-split').textContent = d['view.split'];
        document.getElementById('btn-preview').textContent = d['view.preview'];
        document.getElementById('btn-wechat').textContent = d['view.wechat'];
        document.getElementById('btn-source').title = d['view.source.tip'];
        document.getElementById('btn-split').title = d['view.split.tip'];
        document.getElementById('btn-preview').title = d['view.preview.tip'];
        document.getElementById('btn-wechat').title = d['view.wechat.tip'];
        document.getElementById('md-hint').textContent = d['hint'];
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
        // 状态文案（如果还没被 saver-runtime 改写）
        var stEl = document.getElementById('md-status-text');
        if (stEl && (stEl.textContent === '已就绪' || stEl.textContent === 'Ready' || !stEl.textContent.trim())) {
          stEl.textContent = d['status.ready'];
        }
      }

      function setViewMode(mode) {
        if (!ALLOWED_VIEWS[mode]) mode = 'split';
        var container = document.getElementById('md-container');
        container.dataset.viewMode = mode;
        var btns = document.querySelectorAll('.md-view-btn');
        for (var i = 0; i < btns.length; i++) {
          btns[i].classList.toggle('active', btns[i].dataset.view === mode);
        }
        var actions = document.getElementById('md-wechat-actions');
        if (actions) actions.hidden = mode !== 'wechat';
        if (window.__MD_WECHAT_CTL__) {
          if (mode === 'wechat') window.__MD_WECHAT_CTL__.enter();
          else window.__MD_WECHAT_CTL__.exit();
        }
        try { localStorage.setItem(LS_VIEW, mode); } catch (e) {}
      }

      function setSplitRatio(ratio) {
        if (typeof ratio !== 'number' || !isFinite(ratio)) ratio = DEFAULT_RATIO;
        if (ratio < MIN_RATIO) ratio = MIN_RATIO;
        if (ratio > MAX_RATIO) ratio = MAX_RATIO;
        document.documentElement.style.setProperty('--md-split-left', (ratio * 100).toFixed(2) + '%');
        try { localStorage.setItem(LS_RATIO, ratio.toFixed(3)); } catch (e) {}
      }

      function getInitialRatio() {
        var raw = localStorage.getItem(LS_RATIO);
        var n = parseFloat(raw);
        return (raw !== null && isFinite(n)) ? n : DEFAULT_RATIO;
      }

      function getInitialMode() {
        var raw = localStorage.getItem(LS_VIEW);
        return ALLOWED_VIEWS[raw] ? raw : 'split';
      }

      function startDrag(e) {
        e.preventDefault();
        var splitter = document.getElementById('md-splitter');
        var container = document.getElementById('md-container');
        splitter.classList.add('dragging');

        function onMove(ev) {
          var rect = container.getBoundingClientRect();
          var ratio = (ev.clientX - rect.left) / rect.width;
          setSplitRatio(ratio);
        }
        function onUp() {
          splitter.classList.remove('dragging');
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      }

      // ===== 初始化 =====
      // 1. 应用初始 view mode 和 split ratio
      setViewMode(getInitialMode());
      setSplitRatio(getInitialRatio());

      // 2. 应用初始语言
      applyI18n();

      // 3. 按钮点击绑定
      var btns = document.querySelectorAll('.md-view-btn');
      for (var i = 0; i < btns.length; i++) {
        (function(btn) {
          btn.addEventListener('click', function() { setViewMode(btn.dataset.view); });
        })(btns[i]);
      }

      document.getElementById('btn-wechat-copy').addEventListener('click', function () {
        if (window.__MD_WECHAT_CTL__) window.__MD_WECHAT_CTL__.copyHtml();
      });
      document.getElementById('btn-wechat-export').addEventListener('click', function () {
        if (window.__MD_WECHAT_CTL__) window.__MD_WECHAT_CTL__.exportHtml();
      });

      // 4. splitter 拖拽
      document.getElementById('md-splitter').addEventListener('mousedown', startDrag);

      // 5. 监听 localStorage.doccenter.lang 变化（主 app 切语言时同步）
      window.addEventListener('storage', function(e) {
        if (e.key === LS_LANG) applyI18n();
      });

      // 6. 暴露给 saver-runtime / debug
      window.__MD_VIEW_CTL__ = {
        setViewMode: setViewMode,
        setSplitRatio: setSplitRatio,
        applyI18n: applyI18n
      };
    })();
  </script>

  <script src="/saver-runtime.js" defer></script>
</body>
</html>
